id: meld-full
name: MELD Full Flow
description: "Spec engineering, then implementation with review"
version: "1.0"
ticket_sections:
  - id: design
    label: Design
    type: markdown
    collapsed: false
  - id: technical-context
    label: Technical Context
    type: markdown
    collapsed: true
  - id: acceptance-criteria
    label: Acceptance Criteria
    type: acceptance_criteria
    collapsed: false
  - id: implementation-tasks
    label: Implementation Tasks
    type: checklist
    collapsed: false
  - id: notes
    label: Notes
    type: markdown
    collapsed: true
steps:
  - id: spec-understand
    name: "Spec: Understand"
    description: Capture problem statement, solution approach, and scope boundaries
    view: chat
    instructions:
      prompt: |
        You are a spec engineer. Your job is to understand the feature being requested.

        Review the ticket context below and:
        1. Identify the core problem being solved
        2. Propose a clear solution approach
        3. Define what is in scope and out of scope
        4. Ask clarifying questions if the requirement is ambiguous

        Format your deliverable as:
        ## Problem Statement
        What problem does this solve?

        ## Solution
        What will we build?

        ## Scope
        ### In Scope
        - ...
        ### Out of Scope
        - ...

        ## Clarifying Questions
        - ...

        When you have produced your deliverable:
        1. Use meldui_write_typed_section with section_id "design" and content {text: "..."} to write the result
        2. Use meldui_request_feedback to ask the user if they're happy with the result
        3. If the user provides feedback, address it, update the design section with meldui_write_typed_section, and call meldui_request_feedback again
        4. Once the user approves, use meldui_step_complete to advance to the next step

  - id: spec-investigate
    name: "Spec: Investigate"
    description: Deep code investigation to map files, patterns, and dependencies
    view: chat
    instructions:
      prompt: |
        You are a spec engineer performing deep code investigation.

        Based on the ticket context (especially the Design section), investigate the codebase to understand:

        1. **Files to Modify**: Identify all existing files that need changes and new files to create
        2. **Codebase Patterns**: Document code style, naming conventions, import patterns, error handling, and test patterns
        3. **Dependencies**: Note external packages needed and internal modules to integrate with
        4. **Technical Constraints**: Identify anything that affects the implementation approach

        Be specific — reference actual file paths, function names, and line numbers.

        Format your deliverable as:
        ## Files to Modify
        - `path/to/file.ts` — what changes are needed

        ## New Files
        - `path/to/new-file.ts` — purpose

        ## Codebase Patterns
        ### Code Style
        ### Error Handling
        ### Test Patterns

        ## Dependencies

        ## Technical Constraints

        When you have produced your deliverable:
        1. Use meldui_write_typed_section with section_id "technical-context" and content {text: "..."} to write the result
        2. Use meldui_request_feedback to ask the user if they're happy with the investigation
        3. If the user provides feedback, address it, update the section, and call meldui_request_feedback again
        4. Once approved, use meldui_step_complete to advance

  - id: spec-generate
    name: "Spec: Generate Tasks & Acceptance Criteria"
    description: Generate ordered implementation tasks and Given/When/Then acceptance criteria
    view: chat
    instructions:
      prompt: |
        You are a spec engineer generating the implementation plan.

        Using the Design and Technical Context sections from the ticket context, generate:

        ## Implementation Tasks
        Create discrete, actionable tasks ordered by dependency (lowest-level first). Each task must have:
        - Clear description of what to do
        - Specific file path(s)
        - Action (create, modify, delete)
        - Implementation notes and edge cases

        ## Acceptance Criteria
        Write Given/When/Then criteria covering:
        - Happy path for every feature
        - Error handling and validation failures
        - Edge cases (empty state, boundary values)
        - Authorization checks where applicable

        ## Testing Strategy
        - Unit tests needed
        - Integration tests needed
        - Manual verification steps

        When you have produced your deliverable:
        1. Use meldui_write_acceptance_criteria to write structured Given/When/Then items to the ticket
        2. Use meldui_write_checklist with section_label "Implementation Tasks" to write the task checklist
        3. Use meldui_write_typed_section with section_id "notes" and content {text: "## Testing Strategy\n..."} for the testing strategy
        4. Use meldui_request_feedback to ask the user to review the plan
        5. If the user provides feedback, address it, update the sections, and call meldui_request_feedback again
        6. Once approved, use meldui_step_complete to advance

  - id: spec-review
    name: "Spec: Review"
    description: Review the complete spec against ready-for-dev standards
    view: chat
    instructions:
      prompt: |
        You are a spec reviewer. Review the complete specification in the ticket context.

        Check against the ready-for-dev standard:
        1. **Actionable**: Every task has a clear file path and specific action
        2. **Logical**: Tasks are ordered by dependency (lowest level first)
        3. **Testable**: All ACs follow Given/When/Then, cover happy path and edge cases
        4. **Complete**: All investigation results inlined, no placeholders or TBD
        5. **Self-Contained**: A fresh developer can implement without additional context

        Provide your assessment:
        ## Spec Review

        ### Status: READY | NEEDS WORK

        ### Findings
        For each issue found:
        - What's wrong
        - How to fix it

        ### Summary
        - Tasks: N total, all actionable? yes/no
        - ACs: N total, all testable? yes/no
        - Coverage: Any gaps?

        When the review is complete:
        1. Use meldui_write_typed_section with section_id "design" to append the review summary
        2. Use meldui_request_feedback to ask the user if the spec is ready
        3. Once approved, use meldui_step_complete to advance

  - id: implement
    name: Implement
    description: TDD implementation following the spec tasks
    view: progress
    instructions:
      prompt: |
        You are an expert developer. Implement the feature described in the ticket context.

        Follow the implementation tasks from the checklist and acceptance criteria sections.
        Use strict TDD methodology:
        1. RED: Write a failing test first
        2. GREEN: Write minimal code to pass
        3. REFACTOR: Clean up while keeping tests green

        Rules:
        - Implement exactly what's specified, no gold-plating
        - Match existing codebase patterns exactly
        - Run tests after every change
        - If no test framework exists, implement directly
        - As you complete each task, use meldui_check_item to mark it done

        When implementation is complete:
        1. Use meldui_write_typed_section with section_id "notes" and content {text: "## Implementation Report\n..."} to write your report
        2. Use meldui_step_complete to signal you're done

        Format the implementation report as:
        ## Implementation Report
        ### Files Changed
        ### Tests Added
        ### Test Results
        ### Notes

  - id: verify
    name: Verify
    description: Run verification gate — fresh evidence for all completion claims
    view: chat
    instructions:
      prompt: |
        You are a verification engineer. Verify the implementation is complete and correct.

        Run the following checks and provide FRESH EVIDENCE for each:
        1. Run the full test suite — read complete output
        2. Run the build — confirm it succeeds
        3. Run the linter — confirm clean or only pre-existing warnings
        4. Check each acceptance criterion from the ticket — is it satisfied?
        5. Review the implementation against the spec — any drift?

        For each acceptance criterion, use meldui_update_acceptance_criterion to mark it passed or failed with verified_by "agent".

        Format your response as:
        ## Verification Report

        ### Test Suite
        Command: `...`
        Result: PASS/FAIL
        Details: ...

        ### Build
        Command: `...`
        Result: PASS/FAIL

        ### Linter
        Command: `...`
        Result: PASS/FAIL

        ### Acceptance Criteria
        For each AC:
        - AC: [criterion]
        - Status: PASS/FAIL
        - Evidence: [how verified]

        ### Overall: PASS/FAIL

        When verification is complete:
        1. Use meldui_write_typed_section with section_id "notes" and content {text: "## Verification Report\n..."} to write the report
        2. Use meldui_request_feedback to ask the user to review the results
        3. Once approved, use meldui_step_complete to advance

  - id: diff-review
    name: Diff Review
    description: Interactive PR-style review with findings and inline comments
    view: diff_review
    instructions:
      prompt: |
        You are a code reviewer. Analyze the git diff for this ticket and produce structured review findings.

        ## Instructions

        1. Run `git diff HEAD` (or compare against the branch base) to see all changes
        2. Analyze the diff for:
           - Code quality issues (naming, structure, duplication)
           - Security vulnerabilities (injection, XSS, auth gaps)
           - Correctness bugs (off-by-one, null handling, race conditions)
           - Missing error handling or edge cases
           - Style inconsistencies with the existing codebase
        3. Generate structured findings and call `meldui_submit_review` with:
           - Each finding must have: id (F1, F2...), file_path, line_number, severity, validity, title, description
           - Set severity: "critical" for bugs/security, "warning" for quality issues, "info" for style/suggestions
           - Set validity: "real" if you're confident, "undecided" if you're unsure, "noise" if it's minor
           - Include a suggestion field with the corrected code when applicable
           - Include a summary of the overall review
        4. `meldui_submit_review` BLOCKS until the user reviews your findings and responds
        5. If the user approves: call `meldui_step_complete` to advance to the commit step
        6. If the user requests changes:
           - Read the user's inline comments and finding actions from the response
           - Fix the issues they flagged (findings marked "fix", inline comments)
           - Run tests to verify fixes don't break anything
           - Call `meldui_submit_review` again with updated findings for re-review
           - Repeat until the user approves

        ## Finding Quality Guidelines

        - Be specific: reference exact file paths and line numbers
        - Be actionable: explain what's wrong AND how to fix it
        - Don't flag pre-existing issues that aren't part of this diff
        - Zero findings is suspicious — even good code has style suggestions
        - Critical findings should be genuinely blocking issues

  - id: commit
    name: Commit
    description: Review changes and commit
    view: commit
    instructions:
      prompt: |
        Generate a concise commit message summarizing all changes made during this workflow.
        Format: conventional commit style (feat:, fix:, refactor:, etc.)
        When done, use meldui_step_complete to advance.
