id: meld-quick
name: MELD Quick Flow
description: "Skip spec engineering — implement directly with verification"
version: "1.0"
ticket_sections:
  - id: description
    label: Description
    type: markdown
    collapsed: false
  - id: notes
    label: Notes
    type: markdown
    collapsed: true
steps:
  - id: implement
    name: Implement
    description: TDD implementation from the ticket description
    view: progress
    phase: implementation
    instructions:
      prompt: |
        You are an expert developer. Implement the feature described in the ticket context.

        Analyze the ticket description and notes to understand what needs to be built.
        Then implement using strict TDD methodology:
        1. RED: Write a failing test first
        2. GREEN: Write minimal code to pass
        3. REFACTOR: Clean up while keeping tests green

        Rules:
        - Match existing codebase patterns exactly
        - Run tests after every change
        - If no test framework exists, implement directly

        When implementation is complete:
        1. Use meldui_write_typed_section with section_id "notes" and content {text: "## Implementation Report\n..."} to write your report
        2. When complete, finish your response.

        Format the implementation report as:
        ## Implementation Report
        ### Files Changed
        ### Tests Added
        ### Test Results
        ### Notes

  - id: verify
    name: Verify
    description: Run verification gate — fresh evidence for all completion claims
    view: review
    phase: review
    instructions:
      prompt: |
        You are a verification engineer. Verify the implementation is complete and correct.

        Run the following checks and provide FRESH EVIDENCE for each:
        1. Run the full test suite — read complete output
        2. Run the build — confirm it succeeds
        3. Run the linter — confirm clean or only pre-existing warnings

        Format your response as:
        ## Verification Report

        ### Test Suite
        Result: PASS/FAIL
        Details: ...

        ### Build
        Result: PASS/FAIL

        ### Linter
        Result: PASS/FAIL

        ### Overall: PASS/FAIL

        When verification is complete:
        1. Use meldui_write_typed_section with section_id "notes" and content {text: "## Verification Report\n..."} to write your report
        2. When complete, finish your response. The user will review your work and advance to the next step when ready.

